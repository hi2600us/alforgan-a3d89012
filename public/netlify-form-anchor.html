<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Netlify form anchor</title>
  </head>
  <body>
    <!--
      This static form exists solely so Netlify's build-time form detector
      can register the "contact" form. The real, styled form is rendered by
      React at /halaqat-interest and posts to "/" with the matching fields.
    -->
    <form name="contact" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input type="text" name="bot-field" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="city" />
      <select name="track">
        <option value="child">Child</option>
        <option value="adult">Adult</option>
        <option value="women">Women</option>
      </select>
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
